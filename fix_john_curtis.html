<!DOCTYPE html>
<html>
<head>
  <title>Fix John Curtis Player ID</title>
  <style>
    body { font-family: system-ui; background: #0b1829; color: #f1f5f9; padding: 20px; max-width: 600px; margin: 0 auto; }
    h1 { color: #deab12; font-size: 20px; }
    .status { background: #111f36; border: 1px solid #1e3a5f; border-radius: 8px; padding: 12px; margin: 8px 0; font-size: 13px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
    button { background: #deab12; border: none; border-radius: 8px; color: #0b1829; font-size: 14px; font-weight: 700; padding: 12px 24px; cursor: pointer; margin: 6px 4px 6px 0; }
    button:disabled { opacity: .4; }
    .ok { color: #34d399; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <h1>Fix John Curtis Player ID</h1>
  <p>Old ID in seeded scores: <code>league_2026_p_john_curtis</code></p>
  <p>Actual ID in Firestore: <code>league_2026_p1775055615146</code></p>
  <p>This will delete the old score docs and re-create them with the correct player ID.</p>
  <button id="btn" onclick="fix()">Fix Player ID</button>
  <div class="status" id="st">Ready...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyDW3tTWxOlrPoKiflmlh_6JPLe8vbvVEUE",
      authDomain: "mnq-golf-leage.firebaseapp.com",
      projectId: "mnq-golf-leage",
      storageBucket: "mnq-golf-leage.firebasestorage.app",
      messagingSenderId: "367374056990",
      appId: "1:367374056990:web:70133948f9b2760558780f",
    });
    const db = getFirestore(app);

    const OLD_PID = "league_2026_p_john_curtis";
    const NEW_PID = "league_2026_p1775055615146";
    const LID = "league_2026";

    window.fix = async function() {
      const btn = document.getElementById('btn');
      const st = document.getElementById('st');
      btn.disabled = true;
      st.textContent = "Querying old scores...\n";

      try {
        const q = query(collection(db, "league_hole_scores"),
          where("league_id", "==", LID),
          where("player_id", "==", OLD_PID)
        );
        const snap = await getDocs(q);
        st.textContent += `Found ${snap.size} scores with old ID\n\n`;

        if (snap.size === 0) {
          st.innerHTML += `<span class="err">No scores found with old ID. Already fixed?</span>`;
          btn.disabled = false;
          return;
        }

        let batch = writeBatch(db);
        let bc = 0, total = 0;

        for (const d of snap.docs) {
          const data = d.data();
          // Delete old doc
          batch.delete(d.ref);
          // Create new doc with correct player ID
          const newId = d.id.replace(OLD_PID, NEW_PID);
          const newData = { ...data, id: newId, player_id: NEW_PID };
          batch.set(doc(db, "league_hole_scores", newId), newData);
          bc += 2;
          total++;

          if (bc >= 450) {
            await batch.commit();
            st.textContent += `Processed ${total}/${snap.size}...\n`;
            batch = writeBatch(db);
            bc = 0;
          }
        }
        if (bc > 0) await batch.commit();

        st.innerHTML += `\n<span class="ok">✓ Fixed ${total} score records for John Curtis</span>`;
      } catch(e) {
        st.innerHTML += `<span class="err">Error: ${e.message}</span>`;
      }
      btn.disabled = false;
    };
  </script>
</body>
</html>
