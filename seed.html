window.seedPlayers = async function() {
  document.getElementById("btnPlayers").disabled = true;
  log("Seeding " + DATA.players.length + " players...");
  for (const p of DATA.players) {
    await setDoc(doc(db, "league_players", p.id), p, { merge: true });
    log("  ✓ " + p.name + " (HCP: " + p.handicapIndex + ")", "ok");
  }
  log("Players complete!", "ok");
};

window.seedTeams = async function() {
  document.getElementById("btnTeams").disabled = true;
  log("Seeding " + DATA.teams.length + " teams...");
  for (const t of DATA.teams) {
    await setDoc(doc(db, "league_teams", t.id), t, { merge: true });
    log("  ✓ " + t.name, "ok");
  }
  log("Teams complete!", "ok");
};

window.seedScores = async function() {
  document.getElementById("btnScores").disabled = true;
  const scores = DATA.hole_scores;
  log("Seeding " + scores.length + " hole scores in batches...");
  for (let i = 0; i < scores.length; i += 490) {
    const batch = writeBatch(db);
    const chunk = scores.slice(i, i + 490);
    for (const s of chunk) {
      batch.set(doc(db, "league_hole_scores", s.id), s, { merge: true });
    }
    await batch.commit();
    log("  Batch " + Math.floor(i/490 + 1) + ": wrote " + chunk.length + " scores (" + (i + chunk.length) + "/" + scores.length + ")", "ok");
  }
  log("Scores complete!", "ok");
};

window.seedAll = async function() {
  await window.seedPlayers();
  await window.seedTeams();
  await window.seedScores();
  log("\n🏁 ALL DONE!", "ok");
};
