window.seedAll = async function() {
  log("Adding former players...");
  for (const p of DATA.new_players) {
    await setDoc(doc(db, "league_players", p.id), p, { merge: true });
    log("  ✓ " + p.name, "ok");
  }
  
  const scores = DATA.hole_scores;
  log("\nSeeding " + scores.length + " historical scores in batches...");
  for (let i = 0; i < scores.length; i += 490) {
    const batch = writeBatch(db);
    const chunk = scores.slice(i, i + 490);
    for (const s of chunk) {
      batch.set(doc(db, "league_hole_scores", s.id), s, { merge: true });
    }
    await batch.commit();
    log("  Batch " + Math.floor(i/490 + 1) + ": " + (i + chunk.length) + "/" + scores.length, "ok");
  }
  log("\n🏁 ALL DONE! " + scores.length + " scores from 2023-2024 added.", "ok");
};
