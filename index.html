<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download — MnQ Golf</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Download the MnQ Golf app for the Maize-N-Que Golf League." />
  <link rel="icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --navy: #153453;
      --royal: #10387d;
      --maize: #deab12;
      --text: #2b2f36;
      --muted: #5b626d;
      --border: #e2e5ea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      font-size: 16px;
      min-height: 100vh;
    }
    .wrap { max-width: 520px; margin: 0 auto; padding: 56px 22px 80px; }
    header { text-align: center; margin-bottom: 8px; }
    header .brand {
      font-family: "League Spartan", sans-serif;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--navy);
      font-size: 14px;
    }
    .logo {
      display: block;
      width: 180px;
      max-width: 70%;
      height: auto;
      margin: 0 auto 20px;
    }
    h1 {
      font-family: "League Spartan", sans-serif;
      font-weight: 700;
      color: var(--navy);
      font-size: 30px;
      text-align: center;
      margin: 0 0 10px;
      letter-spacing: 0.5px;
    }
    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 16px;
      margin: 0 auto 36px;
      max-width: 420px;
    }
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 340px;
      margin: 0 auto;
    }
    .store {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      text-decoration: none;
      color: var(--text);
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }
    .store:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(21,52,83,.10);
      border-color: #cfd4dc;
    }
    .store .icon {
      flex: 0 0 auto;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
    }
    .store .label { display: flex; flex-direction: column; line-height: 1.25; }
    .store .label .small {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .store .label .big {
      font-family: "League Spartan", sans-serif;
      font-weight: 700;
      font-size: 19px;
      color: var(--navy);
      letter-spacing: .3px;
    }
    .store .chev { margin-left: auto; color: #b7bdc7; font-size: 20px; }
    .note {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 34px;
      line-height: 1.5;
    }
    .foot {
      text-align: center;
      margin-top: 44px;
      font-size: 13px;
    }
    .foot a { color: var(--royal); text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1620; --card: #172231; --navy: #e7ecf3; --royal: #6fa8ff;
        --text: #e7ecf3; --muted: #9aa4b2; --border: #26313f;
      }
      .store .label .big { color: #f2f5f9; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img class="logo" src="/MnQ_logo_transparent_bg.png" alt="Maize-N-Que Golf" />
    </header>

    <h1>Get the App</h1>
    <p class="sub">Download MnQ Golf on your phone to follow standings, enter scores, and stay on top of the season.</p>

    <div class="cards">
      <!-- Apple App Store (unlisted direct link) -->
      <a class="store" href="https://apps.apple.com/us/app/mnq-golf/id6784305203">
        <span class="icon" aria-hidden="true">
          <svg width="34" height="34" viewBox="0 0 384 512" fill="#153453"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
        </span>
        <span class="label">
          <span class="small">Download on the</span>
          <span class="big">App Store</span>
        </span>
        <span class="chev">&rsaquo;</span>
      </a>

      <!-- Google Play Store -->
      <a class="store" href="https://play.google.com/store/apps/details?id=com.mnqgolf.app">
        <span class="icon" aria-hidden="true">
          <svg width="32" height="32" viewBox="0 0 512 512"><path fill="#153453" d="M47.6 26.9C41.6 33 38 42.4 38 54.6v402.8c0 12.2 3.6 21.6 9.6 27.7l1.4 1.3 225.6-225.6v-5.3L48.9 25.6l-1.3 1.3z"/><path fill="#deab12" d="M349.9 335.5l-75.3-75.3v-5.3l75.3-75.3 1.7 1 89.2 50.7c25.5 14.5 25.5 38.2 0 52.7l-89.2 50.7-1.7 1.1z"/><path fill="#10387d" d="M351.6 334.4L274.6 257.5 47.6 484.5c8.4 8.9 22.3 10 38 1.1l266-151.2"/><path fill="#153453" opacity=".8" d="M351.6 180.6L85.6 29.5c-15.7-8.9-29.6-7.8-38 1.1l227 227 77-77z"/></svg>
        </span>
        <span class="label">
          <span class="small">Get it on</span>
          <span class="big">Google Play</span>
        </span>
        <span class="chev">&rsaquo;</span>
      </a>
    </div>

    <p class="note">
      A league account is required to sign in. The app is for members of the Maize-N-Que Golf League.
    </p>

    <div class="foot">
      <a href="https://www.mnqgolf.com">mnqgolf.com</a> &nbsp;·&nbsp; <a href="/privacy">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
